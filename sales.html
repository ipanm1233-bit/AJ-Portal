<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Sales - Portal HR & Operasional</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .fade-in { animation: fadeIn 0.4s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { backdrop-filter: blur(2px); }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  .tab-active { border-bottom: 3px solid #C8102E; color: #C8102E; }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- ============================================================ -->
  <!-- NAVBAR -->
  <!-- ============================================================ -->
  <nav class="bg-red-600 shadow-lg sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white rounded-lg flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-white font-bold text-base sm:text-lg leading-tight">Dashboard Sales</h1>
          <p class="text-red-100 text-xs" id="userInfoText">Memuat...</p>
        </div>
      </div>
      <button id="logoutBtn" class="text-white bg-red-700 hover:bg-red-800 px-3 py-2 rounded-lg text-sm font-medium transition duration-200">
        Keluar
      </button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

    <!-- TAB NAVIGATION -->
    <div class="flex border-b border-gray-200 mb-6 gap-6">
      <button id="tabRiwayat" class="tab-active pb-3 font-semibold text-sm sm:text-base transition duration-200">
        Riwayat Pengajuan Saya
      </button>
      <button id="tabPengumuman" class="text-gray-500 hover:text-gray-700 pb-3 font-semibold text-sm sm:text-base transition duration-200">
        Pengumuman Approved Final
      </button>
    </div>

    <!-- ============ PANEL 1: RIWAYAT PENGAJUAN SAYA ============ -->
    <div id="panelRiwayat">

      <!-- Tombol Buat Pengajuan Baru -->
      <div class="flex items-center justify-end mb-6">
        <button id="openFormBtn" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-4 sm:px-5 py-2.5 rounded-xl shadow-md hover:shadow-lg transition duration-200 flex items-center gap-2 text-sm sm:text-base">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          <span class="hidden sm:inline">Buat Pengajuan Baru</span>
          <span class="sm:hidden">Baru</span>
        </button>
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="text-center py-16">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-red-600 rounded-full animate-spin mx-auto"></div>
        <p class="text-gray-500 mt-3 text-sm">Memuat riwayat pengajuan...</p>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>
        <p class="text-gray-500 font-medium">Belum ada pengajuan</p>
        <p class="text-gray-400 text-sm mt-1">Klik "Buat Pengajuan Baru" untuk mulai mengajukan.</p>
      </div>

      <!-- List Riwayat (diisi via JS) -->
      <div id="riwayatList" class="hidden space-y-4"></div>

    </div>

    <!-- ============ PANEL 2: PENGUMUMAN APPROVED FINAL ============ -->
    <div id="panelPengumuman" class="hidden">
      <div id="pengumumanLoadingState" class="text-center py-16">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-red-600 rounded-full animate-spin mx-auto"></div>
        <p class="text-gray-500 mt-3 text-sm">Memuat data...</p>
      </div>

      <div id="pengumumanEmptyState" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>
        <p class="text-gray-500 font-medium">Belum ada pengajuan yang disetujui final</p>
      </div>

      <div id="pengumumanList" class="hidden space-y-4"></div>
    </div>

  </main>

  <!-- ============================================================ -->
  <!-- MODAL: FORM PENGAJUAN BARU -->
  <!-- ============================================================ -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/50 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto scrollbar-thin fade-in">

      <div class="sticky top-0 bg-white px-6 py-4 border-b border-gray-100 flex items-center justify-between rounded-t-2xl">
        <h3 class="text-lg font-bold text-gray-800">Buat Pengajuan Baru</h3>
        <button id="closeFormBtn" class="text-gray-400 hover:text-gray-600 transition duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <form id="pengajuanForm" class="px-6 py-5 space-y-5">

        <!-- Pilihan Jenis Pengajuan -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Jenis Pengajuan</label>
          <select id="jenisPengajuan" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800 bg-white">
            <option value="" disabled selected>-- Pilih Jenis Pengajuan --</option>
            <option value="Pergeseran Libur">Pergeseran Libur</option>
            <option value="Peminjaman Kendaraan Kantor">Peminjaman Kendaraan Kantor</option>
            <option value="Support Toko">Support Toko</option>
            <option value="Dinas Luar Kota" id="optDinasLuarKota">Dinas Luar Kota</option>
          </select>
        </div>

        <!-- Container Form Dinamis (diisi via JS) -->
        <div id="dynamicFormContainer" class="space-y-5"></div>

        <!-- Alert Error -->
        <div id="formErrorAlert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm font-medium"></div>

        <button type="submit" id="submitFormBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2">
          <span id="submitFormBtnText">Kirim Pengajuan</span>
          <div id="submitFormSpinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        </button>

      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden fixed bottom-6 right-6 left-6 sm:left-auto bg-gray-900 text-white px-5 py-3.5 rounded-xl shadow-xl z-50 fade-in text-sm font-medium"></div>

<script>
  // ============================================================
  // KONFIGURASI
  // ============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbz9NcMkamfXwbKBUDZ0RptFumy0vkawRcxaJ1kPWFCD2y-6FyX-3OmB1wXdn3nmVcJt6w/exec';
  const AREA_COVER_OPTIONS = ['Kuningan', 'Majalengka', 'Indramayu', 'Tegal'];

  let currentUser = null;

  // ============================================================
  // HELPER - Panggil API (text/plain untuk hindari CORS preflight)
  // ============================================================
  async function callApi(payload) {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) {
      throw new Error('Gagal terhubung ke server (HTTP ' + response.status + ')');
    }
    return await response.json();
  }

  // ============================================================
  // SESSION CHECK - Pastikan user sudah login & role sesuai
  // ============================================================
  function checkSession() {
    const savedUser = localStorage.getItem('hr_portal_user');
    if (!savedUser) {
      window.location.href = 'index.html';
      return null;
    }
    try {
      const userObj = JSON.parse(savedUser);
      if (!userObj || (userObj.role !== 'Sales' && userObj.role !== 'SPV')) {
        window.location.href = 'index.html';
        return null;
      }
      return userObj;
    } catch (err) {
      localStorage.removeItem('hr_portal_user');
      window.location.href = 'index.html';
      return null;
    }
  }

  function showToast(message, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'fixed bottom-6 right-6 left-6 sm:left-auto px-5 py-3.5 rounded-xl shadow-xl z-50 fade-in text-sm font-medium ' +
      (isError ? 'bg-red-600 text-white' : 'bg-gray-900 text-white');
    toast.classList.remove('hidden');
    setTimeout(function () { toast.classList.add('hidden'); }, 3500);
  }

  // ============================================================
  // RENDER FORM DINAMIS berdasarkan Jenis Pengajuan
  // ============================================================
  function renderDynamicForm(jenis) {
    const container = document.getElementById('dynamicFormContainer');
    container.innerHTML = '';

    if (jenis === 'Pergeseran Libur') {
      container.innerHTML = `
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Hari Libur Asli</label>
          <input type="date" id="field_hariLiburAsli" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Area Cover</label>
          <select id="field_areaCover" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800 bg-white">
            <option value="" disabled selected>-- Pilih Area --</option>
            ${AREA_COVER_OPTIONS.map(function (area) { return '<option value="' + area + '">' + area + '</option>'; }).join('')}
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Alasan</label>
          <textarea id="field_alasan" required rows="3"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800 resize-none"
            placeholder="Jelaskan alasan pergeseran libur"></textarea>
        </div>
      `;
    } else if (jenis === 'Peminjaman Kendaraan Kantor') {
      const isSpv = currentUser && currentUser.role === 'SPV';
      container.innerHTML = `
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Berapa Hari Pinjam</label>
          <input type="number" id="field_berapaHariPinjam" required min="1"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
            placeholder="Contoh: 3">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tanggal Kembali</label>
          <input type="date" id="field_tanggalKembali" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800">
        </div>
        ${isSpv ? `
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Untuk Sales Siapa</label>
          <input type="text" id="field_untukSalesSiapa" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
            placeholder="Nama sales yang akan menggunakan kendaraan">
        </div>
        ` : ''}
      `;
    } else if (jenis === 'Support Toko') {
      container.innerHTML = `
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Toko</label>
          <input type="text" id="field_namaToko" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
            placeholder="Contoh: Toko Sumber Jaya">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Bentuk Support</label>
          <textarea id="field_bentukSupport" required rows="3"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800 resize-none"
            placeholder="Jelaskan bentuk support yang dibutuhkan"></textarea>
        </div>
        <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-amber-700 text-sm">
          Pengajuan ini akan diteruskan ke Finance untuk validasi budget sebelum disetujui GM & HRD.
        </div>
      `;
    } else if (jenis === 'Dinas Luar Kota') {
      container.innerHTML = `
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tujuan Dinas</label>
          <input type="text" id="field_tujuanDinas" required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
            placeholder="Contoh: Survey toko baru wilayah Tegal">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Plan Kunjungan ke Toko Mana Saja</label>
          <div id="tokoDinasContainer" class="space-y-2"></div>
          <button type="button" id="addTokoDinasBtn" class="mt-2 text-red-600 hover:text-red-700 text-sm font-semibold flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Tambah Toko
          </button>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Plan Menginap</label>
          <textarea id="field_planMenginap" required rows="2"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800 resize-none"
            placeholder="Contoh: 2 malam di Hotel Grand Tegal, 17-18 Juni 2026"></textarea>
        </div>
      `;
      // Render baris toko pertama secara default, lalu pasang listener tombol tambah
      addTokoDinasRow();
      document.getElementById('addTokoDinasBtn').addEventListener('click', addTokoDinasRow);
    }
  }

  // ============================================================
  // DINAS LUAR KOTA - Helper tambah/hapus baris input toko dinamis
  // Setiap baris diberi data-index unik supaya bisa dihapus tanpa
  // mengacaukan urutan baris lain (tidak bergantung pada posisi DOM).
  // ============================================================
  let tokoDinasRowCounter = 0;

  function addTokoDinasRow() {
    const container = document.getElementById('tokoDinasContainer');
    if (!container) return;

    const rowIndex = tokoDinasRowCounter++;
    const rowDiv = document.createElement('div');
    rowDiv.className = 'flex gap-2';
    rowDiv.setAttribute('data-toko-row', rowIndex);
    rowDiv.innerHTML = `
      <input type="text" class="tokoDinasInput flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
        placeholder="Nama toko ke-${rowIndex + 1}" required>
      <button type="button" class="removeTokoDinasBtn px-3 rounded-xl border border-gray-300 text-gray-400 hover:text-red-600 hover:border-red-300 transition duration-200" data-row-index="${rowIndex}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    `;
    container.appendChild(rowDiv);

    rowDiv.querySelector('.removeTokoDinasBtn').addEventListener('click', function () {
      // Minimal harus ada 1 baris toko - cegah container menjadi kosong total
      const totalRows = container.querySelectorAll('[data-toko-row]').length;
      if (totalRows <= 1) {
        showToast('Minimal harus ada 1 toko yang diisi.', true);
        return;
      }
      rowDiv.remove();
    });
  }

  document.getElementById('jenisPengajuan').addEventListener('change', function (e) {
    renderDynamicForm(e.target.value);
  });

  // ============================================================
  // KUMPULKAN DATA FORM DINAMIS menjadi object "detail"
  // ============================================================
  function collectFormDetail(jenis) {
    if (jenis === 'Pergeseran Libur') {
      return {
        hariLiburAsli: document.getElementById('field_hariLiburAsli').value,
        areaCover: document.getElementById('field_areaCover').value,
        alasan: document.getElementById('field_alasan').value
      };
    } else if (jenis === 'Peminjaman Kendaraan Kantor') {
      const detail = {
        berapaHariPinjam: document.getElementById('field_berapaHariPinjam').value,
        tanggalKembali: document.getElementById('field_tanggalKembali').value
      };
      const untukSalesField = document.getElementById('field_untukSalesSiapa');
      if (untukSalesField) {
        detail.untukSalesSiapa = untukSalesField.value;
      }
      return detail;
    } else if (jenis === 'Support Toko') {
      return {
        namaToko: document.getElementById('field_namaToko').value,
        bentukSupport: document.getElementById('field_bentukSupport').value
      };
    } else if (jenis === 'Dinas Luar Kota') {
      const tokoInputs = document.querySelectorAll('.tokoDinasInput');
      const daftarToko = Array.from(tokoInputs)
        .map(function (input) { return input.value.trim(); })
        .filter(function (val) { return val.length > 0; });

      return {
        tujuanDinas: document.getElementById('field_tujuanDinas').value,
        planKunjunganToko: daftarToko,
        planMenginap: document.getElementById('field_planMenginap').value
      };
    }
    return {};
  }

  // ============================================================
  // MODAL HANDLERS
  // ============================================================
  function openModal() {
    document.getElementById('formModal').classList.remove('hidden');
    document.getElementById('pengajuanForm').reset();
    document.getElementById('dynamicFormContainer').innerHTML = '';
    document.getElementById('formErrorAlert').classList.add('hidden');
  }

  function closeModal() {
    document.getElementById('formModal').classList.add('hidden');
  }

  document.getElementById('openFormBtn').addEventListener('click', openModal);
  document.getElementById('closeFormBtn').addEventListener('click', closeModal);
  document.getElementById('formModal').addEventListener('click', function (e) {
    if (e.target === e.currentTarget) closeModal();
  });

  // ============================================================
  // SUBMIT PENGAJUAN
  // ============================================================
  document.getElementById('pengajuanForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const jenis = document.getElementById('jenisPengajuan').value;
    const errorAlert = document.getElementById('formErrorAlert');
    errorAlert.classList.add('hidden');

    if (!jenis) {
      errorAlert.textContent = 'Pilih jenis pengajuan terlebih dahulu.';
      errorAlert.classList.remove('hidden');
      return;
    }

    const submitBtn = document.getElementById('submitFormBtn');
    const submitBtnText = document.getElementById('submitFormBtnText');
    const submitSpinner = document.getElementById('submitFormSpinner');

    submitBtn.disabled = true;
    submitBtnText.textContent = 'Mengirim...';
    submitSpinner.classList.remove('hidden');

    try {
      const detail = collectFormDetail(jenis);

      const result = await callApi({
        action: 'submit_pengajuan',
        namaPemohon: currentUser.namaLengkap || currentUser.username,
        posisi: currentUser.posisi || currentUser.role,
        jenisPengajuan: jenis,
        detail: detail
      });

      if (result.success) {
        showToast('Pengajuan berhasil dikirim!', false);
        closeModal();
        loadRiwayatPengajuan();
      } else {
        errorAlert.textContent = result.message || 'Gagal mengirim pengajuan.';
        errorAlert.classList.remove('hidden');
      }
    } catch (err) {
      errorAlert.textContent = 'Terjadi kesalahan: ' + err.message;
      errorAlert.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
      submitBtnText.textContent = 'Kirim Pengajuan';
      submitSpinner.classList.add('hidden');
    }
  });

  // ============================================================
  // BADGE STATUS - Helper untuk mewarnai status
  // ============================================================
  function getStatusBadgeClass(status) {
    if (status === 'Approved Final' || status === 'Done' || status === 'Approved') {
      return 'bg-green-100 text-green-700';
    } else if (status === 'Rejected') {
      return 'bg-red-100 text-red-700';
    } else if (status === 'Pending' || status === 'Process' || status === 'Pending Input Finance') {
      return 'bg-amber-100 text-amber-700';
    } else if (status === 'Waiting Finance') {
      return 'bg-blue-100 text-blue-700';
    }
    return 'bg-gray-100 text-gray-600';
  }

  // ============================================================
  // RENDER 1 CARD RIWAYAT PENGAJUAN
  // ============================================================
  function renderRiwayatCard(item) {
    let detailHtml = '';
    if (item.jenisPengajuan === 'Pergeseran Libur') {
      detailHtml = `
        <p class="text-gray-600 text-sm">Hari Libur Asli: <span class="font-medium text-gray-800">${item.detail.hariLiburAsli || '-'}</span></p>
        <p class="text-gray-600 text-sm">Area Cover: <span class="font-medium text-gray-800">${item.detail.areaCover || '-'}</span></p>
      `;
    } else if (item.jenisPengajuan === 'Peminjaman Kendaraan Kantor') {
      detailHtml = `
        <p class="text-gray-600 text-sm">Lama Pinjam: <span class="font-medium text-gray-800">${item.detail.berapaHariPinjam || '-'} hari</span></p>
        <p class="text-gray-600 text-sm">Tanggal Kembali: <span class="font-medium text-gray-800">${item.detail.tanggalKembali || '-'}</span></p>
        ${item.detail.untukSalesSiapa ? '<p class="text-gray-600 text-sm">Untuk Sales: <span class="font-medium text-gray-800">' + item.detail.untukSalesSiapa + '</span></p>' : ''}
      `;
    } else if (item.jenisPengajuan === 'Support Toko') {
      detailHtml = `
        <p class="text-gray-600 text-sm">Nama Toko: <span class="font-medium text-gray-800">${item.detail.namaToko || '-'}</span></p>
        ${item.detail.omsetToko ? '<p class="text-gray-600 text-sm">Omset: <span class="font-medium text-gray-800">Rp ' + Number(item.detail.omsetToko).toLocaleString('id-ID') + '</span></p>' : ''}
        ${item.detail.plafonBudget ? '<p class="text-gray-600 text-sm">Plafon Budget: <span class="font-medium text-gray-800">Rp ' + Number(item.detail.plafonBudget).toLocaleString('id-ID') + '</span></p>' : ''}
      `;
    } else if (item.jenisPengajuan === 'Dinas Luar Kota') {
      const daftarTokoStr = Array.isArray(item.detail.planKunjunganToko)
        ? item.detail.planKunjunganToko.join(', ')
        : (item.detail.planKunjunganToko || '-');
      detailHtml = `
        <p class="text-gray-600 text-sm">Tujuan Dinas: <span class="font-medium text-gray-800">${item.detail.tujuanDinas || '-'}</span></p>
        <p class="text-gray-600 text-sm">Kunjungan Toko: <span class="font-medium text-gray-800">${daftarTokoStr}</span></p>
        <p class="text-gray-600 text-sm">Plan Menginap: <span class="font-medium text-gray-800">${item.detail.planMenginap || '-'}</span></p>
      `;
    }

    return `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition duration-200">
        <div class="flex items-start justify-between mb-3 flex-wrap gap-2">
          <div>
            <p class="text-xs text-gray-400 font-mono">${item.idTransaksi}</p>
            <h3 class="font-bold text-gray-800 mt-0.5">${item.jenisPengajuan}</h3>
          </div>
          <span class="text-xs px-3 py-1 rounded-full font-semibold ${getStatusBadgeClass(item.statusFinal)}">${item.statusFinal}</span>
        </div>
        <div class="space-y-1 mb-3">${detailHtml}</div>
        <div class="flex items-center gap-4 pt-3 border-t border-gray-100 text-xs">
          <span class="text-gray-500">Finance: <b class="${item.statusFinance === '-' ? 'text-gray-400' : ''}">${item.statusFinance}</b></span>
          <span class="text-gray-500">GM: <b>${item.statusGM}</b></span>
          <span class="text-gray-500">HRD: <b>${item.statusHRD}</b></span>
        </div>
        ${item.catatan ? '<p class="text-xs text-gray-400 mt-2 italic">Catatan: ' + item.catatan + '</p>' : ''}
        <p class="text-xs text-gray-400 mt-2">${item.tanggal}</p>
      </div>
    `;
  }

  // ============================================================
  // LOAD RIWAYAT PENGAJUAN PRIBADI
  // ============================================================
  async function loadRiwayatPengajuan() {
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const riwayatList = document.getElementById('riwayatList');

    loadingState.classList.remove('hidden');
    emptyState.classList.add('hidden');
    riwayatList.classList.add('hidden');

    try {
      const result = await callApi({
        action: 'get_data',
        mode: 'riwayat_pribadi',
        username: currentUser.namaLengkap || currentUser.username
      });

      loadingState.classList.add('hidden');

      if (result.success && result.data && result.data.length > 0) {
        riwayatList.innerHTML = result.data.map(renderRiwayatCard).join('');
        riwayatList.classList.remove('hidden');
      } else {
        emptyState.classList.remove('hidden');
      }
    } catch (err) {
      loadingState.classList.add('hidden');
      showToast('Gagal memuat riwayat: ' + err.message, true);
      emptyState.classList.remove('hidden');
    }
  }

  // ============================================================
  // TAB SWITCHING
  // ============================================================
  document.getElementById('tabRiwayat').addEventListener('click', function () {
    document.getElementById('tabRiwayat').classList.add('tab-active');
    document.getElementById('tabRiwayat').classList.remove('text-gray-500');
    document.getElementById('tabPengumuman').classList.remove('tab-active');
    document.getElementById('tabPengumuman').classList.add('text-gray-500');
    document.getElementById('panelRiwayat').classList.remove('hidden');
    document.getElementById('panelPengumuman').classList.add('hidden');
  });

  document.getElementById('tabPengumuman').addEventListener('click', function () {
    document.getElementById('tabPengumuman').classList.add('tab-active');
    document.getElementById('tabPengumuman').classList.remove('text-gray-500');
    document.getElementById('tabRiwayat').classList.remove('tab-active');
    document.getElementById('tabRiwayat').classList.add('text-gray-500');
    document.getElementById('panelPengumuman').classList.remove('hidden');
    document.getElementById('panelRiwayat').classList.add('hidden');
    loadPengumumanApprovedFinal(); // refresh data setiap kali tab dibuka
  });

  // ============================================================
  // RENDER CARD - PENGUMUMAN APPROVED FINAL
  // ============================================================
  function renderPengumumanCard(item) {
    let detailHtml = '';
    if (item.jenisPengajuan === 'Pergeseran Libur') {
      detailHtml = `<p class="text-gray-600 text-sm">Area Cover: <span class="font-medium text-gray-800">${item.detail.areaCover || '-'}</span></p>`;
    } else if (item.jenisPengajuan === 'Peminjaman Kendaraan Kantor') {
      detailHtml = `<p class="text-gray-600 text-sm">Lama Pinjam: <span class="font-medium text-gray-800">${item.detail.berapaHariPinjam || '-'} hari</span></p>`;
    } else if (item.jenisPengajuan === 'Support Toko') {
      detailHtml = `<p class="text-gray-600 text-sm">Toko: <span class="font-medium text-gray-800">${item.detail.namaToko || '-'}</span></p>`;
    } else if (item.jenisPengajuan === 'Dinas Luar Kota') {
      const daftarTokoStr = Array.isArray(item.detail.planKunjunganToko)
        ? item.detail.planKunjunganToko.join(', ')
        : (item.detail.planKunjunganToko || '-');
      detailHtml = `<p class="text-gray-600 text-sm">Kunjungan Toko: <span class="font-medium text-gray-800">${daftarTokoStr}</span></p>`;
    }

    return `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div class="flex items-start justify-between mb-3 flex-wrap gap-2">
          <div>
            <p class="text-xs text-gray-400 font-mono">${item.idTransaksi}</p>
            <h3 class="font-bold text-gray-800 mt-0.5">${item.jenisPengajuan}</h3>
          </div>
          <span class="text-xs px-3 py-1 rounded-full font-semibold bg-green-100 text-green-700">Approved Final</span>
        </div>
        <p class="text-gray-600 text-sm mb-1">Pemohon: <span class="font-medium text-gray-800">${item.namaPemohon}</span> (${item.posisi})</p>
        ${detailHtml}
        <p class="text-xs text-gray-400 mt-3">${item.tanggal}</p>
      </div>
    `;
  }

  // ============================================================
  // LOAD: PENGUMUMAN APPROVED FINAL
  // ============================================================
  async function loadPengumumanApprovedFinal() {
    const loadingState = document.getElementById('pengumumanLoadingState');
    const emptyState = document.getElementById('pengumumanEmptyState');
    const list = document.getElementById('pengumumanList');

    loadingState.classList.remove('hidden');
    emptyState.classList.add('hidden');
    list.classList.add('hidden');

    try {
      const result = await callApi({ action: 'get_data', mode: 'approved_final' });
      loadingState.classList.add('hidden');

      if (result.success && result.data && result.data.length > 0) {
        list.innerHTML = result.data.map(renderPengumumanCard).join('');
        list.classList.remove('hidden');
      } else {
        emptyState.classList.remove('hidden');
      }
    } catch (err) {
      loadingState.classList.add('hidden');
      showToast('Gagal memuat data: ' + err.message, true);
      emptyState.classList.remove('hidden');
    }
  }

  // ============================================================
  // LOGOUT
  // ============================================================
  document.getElementById('logoutBtn').addEventListener('click', function () {
    localStorage.removeItem('hr_portal_user');
    window.location.href = 'index.html';
  });

  // ============================================================
  // INISIALISASI HALAMAN
  // ============================================================
  (function init() {
    currentUser = checkSession();
    if (!currentUser) return;

    document.getElementById('userInfoText').textContent =
      (currentUser.namaLengkap || currentUser.username) + ' - ' + (currentUser.posisi || currentUser.role);

    loadRiwayatPengajuan();
  })();
</script>

</body>
</html>

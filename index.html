<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal HR & Operasional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-96 border-t-8 border-red-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">PORTAL<span class="text-red-600"> INTERNAL</span></h1>
            <p class="text-sm text-gray-500 mt-2">Masuk untuk mengakses sistem pengajuan</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700">Username / NIK</label>
                <input type="text" id="username" required class="mt-1 w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            
            <p id="errorMsg" class="text-red-500 text-sm hidden font-semibold text-center"></p>

            <button type="submit" id="btnSubmit" class="w-full bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700 transition shadow-lg">
                MASUK KE SISTEM
            </button>
        </form>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP ANDA YANG BARU
        const GAS_URL = "URL_WEB_APP_ANDA_DISINI"; 

        // Cek apakah sudah login, jika ya, langsung tendang ke dashboard
        if(localStorage.getItem('userRole')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = "Memeriksa..."; btn.disabled = true;
            errorMsg.classList.add('hidden');

            const payload = {
                action: "login",
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();

                if(result.status === "success") {
                    // Simpan sesi ke memori browser
                    localStorage.setItem('userRole', result.userData.role);
                    localStorage.setItem('userName', result.userData.nama);
                    localStorage.setItem('userPosisi', result.userData.posisi);
                    
                    // Arahkan ke dashboard utama
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = result.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Koneksi ke server gagal.";
                errorMsg.classList.remove('hidden');
            }
            btn.innerText = "MASUK KE SISTEM"; btn.disabled = false;
        });
    </script>
</body>
</html>

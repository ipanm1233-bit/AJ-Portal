<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal HR & Operasional - Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .bg-gradient-corporate {
    background: linear-gradient(135deg, #C8102E 0%, #8a0b20 100%);
  }
  .spinner {
    border-top-color: #C8102E;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .fade-in {
    animation: fadeIn 0.5s ease-in-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md fade-in">
    <!-- Card Login -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <!-- Header dengan gradient merah -->
      <div class="bg-gradient-corporate px-8 py-10 text-center">
        <div class="w-16 h-16 bg-white rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h1 class="text-white text-2xl font-bold tracking-tight">Portal HR & Operasional</h1>
        <p class="text-red-100 text-sm mt-1">Internal Company System</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        <form id="loginForm" class="space-y-5">

          <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              autocomplete="username"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
              placeholder="Masukkan username"
            >
          </div>

          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-red-600 focus:ring-2 focus:ring-red-100 outline-none transition duration-200 text-gray-800"
              placeholder="Masukkan password"
            >
          </div>

          <!-- Alert Error -->
          <div id="errorAlert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm font-medium"></div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2"
          >
            <span id="loginBtnText">Masuk</span>
            <div id="loginSpinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          </button>

        </form>
      </div>
    </div>

    <p class="text-center text-gray-400 text-xs mt-6">© 2026 Internal HR System. All rights reserved.</p>
  </div>

<script>
  // ============================================================
  // KONFIGURASI - GANTI DENGAN URL DEPLOYMENT GAS ANDA
  // ============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbwziA_P66W6-UquUkzmb8nOwS6PSG0f_ZI6anMHuygGAcpAMTAi6d_ZBSN1IIlli2M5/exec';

  // ============================================================
  // HELPER - Mengirim request ke GAS API
  // Menggunakan Content-Type: text/plain untuk menghindari
  // CORS preflight (OPTIONS request) yang tidak didukung GAS dengan baik
  // ============================================================
  async function callApi(payload) {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error('Gagal terhubung ke server (HTTP ' + response.status + ')');
    }

    return await response.json();
  }

  // ============================================================
  // HELPER - Routing redirect berdasarkan role
  // ============================================================
  function redirectByRole(role) {
    switch (role) {
      case 'Sales':
      case 'SPV':
        window.location.href = 'sales.html';
        break;
      case 'GM':
        window.location.href = 'gm.html';
        break;
      case 'HRD':
        window.location.href = 'hrd.html';
        break;
      case 'Finance':
        window.location.href = 'finance.html';
        break;
      default:
        showError('Role "' + role + '" tidak memiliki halaman tujuan.');
        break;
    }
  }

  function showError(message) {
    const errorAlert = document.getElementById('errorAlert');
    errorAlert.textContent = message;
    errorAlert.classList.remove('hidden');
  }

  function hideError() {
    document.getElementById('errorAlert').classList.add('hidden');
  }

  function setLoading(isLoading) {
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginSpinner = document.getElementById('loginSpinner');

    loginBtn.disabled = isLoading;
    if (isLoading) {
      loginBtnText.textContent = 'Memproses...';
      loginSpinner.classList.remove('hidden');
    } else {
      loginBtnText.textContent = 'Masuk';
      loginSpinner.classList.add('hidden');
    }
  }

  // ============================================================
  // EVENT HANDLER - Submit Form Login
  // ============================================================
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showError('Username dan password wajib diisi.');
      return;
    }

    setLoading(true);

    try {
      const result = await callApi({
        action: 'login',
        username: username,
        password: password
      });

      if (result.success) {
        // Simpan sesi ke localStorage
        localStorage.setItem('hr_portal_user', JSON.stringify(result.user));
        redirectByRole(result.user.role);
      } else {
        showError(result.message || 'Login gagal. Periksa kembali username/password Anda.');
      }
    } catch (err) {
      showError('Terjadi kesalahan koneksi: ' + err.message);
    } finally {
      setLoading(false);
    }
  });

  // ============================================================
  // AUTO-REDIRECT jika sudah login sebelumnya (sesi masih ada)
  // ============================================================
  (function checkExistingSession() {
    const savedUser = localStorage.getItem('hr_portal_user');
    if (savedUser) {
      try {
        const userObj = JSON.parse(savedUser);
        if (userObj && userObj.role) {
          redirectByRole(userObj.role);
        }
      } catch (parseErr) {
        localStorage.removeItem('hr_portal_user');
      }
    }
  })();
</script>

</body>
</html>

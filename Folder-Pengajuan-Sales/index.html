<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pengajuan Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dynamic-field { display: none; }
        .dynamic-field.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="bg-white max-w-lg w-full rounded-xl shadow-xl overflow-hidden border-t-8 border-red-600">
        <div class="p-6 bg-red-600 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wide">PORTAL PENGAJUAN</h1>
            <p class="text-sm mt-1 opacity-90">Sistem Terintegrasi HRD & Operasional</p>
        </div>
        
        <form id="formPengajuan" class="p-8 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Nama Lengkap</label>
                <input type="text" id="nama" required class="mt-1 w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700">Posisi</label>
                <select id="posisi" required class="mt-1 w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none bg-white">
                    <option value="">-- Pilih Posisi --</option>
                    <option value="SPV Sales">SPV Sales</option>
                    <option value="Sales">Sales</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Jenis Pengajuan</label>
                <select id="jenis" required class="mt-1 w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none bg-white" onchange="showFields()">
                    <option value="">-- Pilih Jenis --</option>
                    <option value="Pergeseran Libur">Pergeseran Libur</option>
                    <option value="Dinas Luar Kota">Dinas Luar Kota</option>
                    <option value="Peminjaman Motor">Peminjaman Motor Kantor</option>
                    <option value="Support Toko">Support Toko</option>
                </select>
            </div>

            <!-- Dynamic Fields -->
            <div id="fields_libur" class="dynamic-field space-y-4">
                <input type="date" id="tgl_asli" class="w-full p-3 border rounded-lg" placeholder="Tanggal Libur Asli">
                <input type="date" id="tgl_ganti" class="w-full p-3 border rounded-lg" placeholder="Tanggal Pengganti">
            </div>
            
            <div id="fields_dinas" class="dynamic-field space-y-4">
                <input type="text" id="tujuan_dinas" class="w-full p-3 border rounded-lg" placeholder="Kota Tujuan (Misal: Tegal)">
                <input type="text" id="tgl_dinas" class="w-full p-3 border rounded-lg" placeholder="Rentang Waktu (Misal: 10-12 Juli)">
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-red-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-red-700 transition duration-300 shadow-md">
                KIRIM PENGAJUAN
            </button>
        </form>
    </div>

    <script>
        const GAS_URL = "URL_WEB_APP_ANDA_DISINI"; // PASTE URL WEB APP APPS SCRIPT DI SINI

        function showFields() {
            document.querySelectorAll('.dynamic-field').forEach(el => el.classList.remove('active'));
            const val = document.getElementById('jenis').value;
            if(val === "Pergeseran Libur") document.getElementById('fields_libur').classList.add('active');
            if(val === "Dinas Luar Kota") document.getElementById('fields_dinas').classList.add('active');
            // Tambahkan logika dinamis lainnya di sini
        }

        document.getElementById('formPengajuan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Mengirim..."; btn.disabled = true;

            const jenis = document.getElementById('jenis').value;
            let detailObj = {};
            if(jenis === "Pergeseran Libur") {
                detailObj = { "Tgl Asli": document.getElementById('tgl_asli').value, "Tgl Ganti": document.getElementById('tgl_ganti').value };
            } else if (jenis === "Dinas Luar Kota") {
                detailObj = { "Tujuan": document.getElementById('tujuan_dinas').value, "Waktu": document.getElementById('tgl_dinas').value };
            }

            const payload = {
                action: "submit_pengajuan",
                nama: document.getElementById('nama').value,
                posisi: document.getElementById('posisi').value,
                jenis: jenis,
                detail: detailObj
            };

            try {
                // Fetch tanpa content-type (text/plain) untuk menghindari CORS preflight block
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                alert(result.message);
                document.getElementById('formPengajuan').reset();
                showFields();
            } catch (err) {
                alert("Terjadi kesalahan sistem.");
            }
            btn.innerText = "KIRIM PENGAJUAN"; btn.disabled = false;
        });
    </script>
</body>
</html>
